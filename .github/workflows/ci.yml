name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (Ubuntu)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libomp-dev pkg-config
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DATLAS_BUILD_TESTS=ON -DATLAS_BUILD_EXAMPLES=ON
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: Run tests
        run: ctest --output-on-failure --test-dir build
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-build-artifacts
          path: |
            build/src/libatlas.*
            build/tests/*
            build/examples/*
          retention-days: 7

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Run tests
        run: ctest -C Release --output-on-failure --test-dir build
      
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-build-artifacts-windows
          path: build/Release/*.lib
          retention-days: 7

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libomp-dev gcovr lcov
      
      - name: Configure with coverage
        run: |
          cmake -B build-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DATLAS_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
      
      - name: Build
        run: cmake --build build-coverage --parallel
      
      - name: Run tests with coverage
        run: ctest --output-on-failure --test-dir build-coverage
      
      - name: Generate coverage report
        run: |
          gcovr --sonarqube coverage.xml --exclude-unreachable-branches || true
          lcov --capture --directory build-coverage --output-file coverage.info
          lcov --remove coverage.info '/usr/*' --output-file coverage.filtered.info
          genhtml coverage.filtered.info --output-directory coverage-report
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: atlas-coverage-report
          path: coverage-report/
          retention-days: 14

  notifications:
    name: Failure Notifications
    needs: [build-and-test, build-windows]
    if: failure()
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify on failure
        run: |
          echo "::notice title=CI Build Failed::The CI pipeline for Atlas has failed. Please check the logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
      - name: Create failure summary
        if: github.event_name == 'push'
        run: |
          echo "## CI Build Failure Summary" > failure_summary.md
          echo "**Repository:** ${{ github.repository }}" >> failure_summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> failure_summary.md
          echo "**Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> failure_summary.md
          echo "**Triggered by:** ${{ github.actor }}" >> failure_summary.md
          
      - name: Upload failure summary
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: failure-summary
          path: failure_summary.md
          retention-days: 30
