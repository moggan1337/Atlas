name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
        continue-on-error: true
      - name: Build
        run: npm run build
        continue-on-error: true
      - name: Test
        run: npm test
        continue-on-error: true
